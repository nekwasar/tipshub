version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: tipshub-db
    environment:
      POSTGRES_DB: ${DB_NAME:-tipshub}
      POSTGRES_USER: ${DB_USER:-tipshub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tipshub_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tipshub-backend
    ports:
      - "7453:8000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-tipshub_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-tipshub}
      SECRET_KEY: ${DJANGO_SECRET_KEY:-changeme-secret-key}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

  # React Frontend (Coming Soon Page)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tipshub-frontend
    ports:
      - "6291:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tipshub-nginx
    ports:
      - "9401:80"
      - "9402:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
